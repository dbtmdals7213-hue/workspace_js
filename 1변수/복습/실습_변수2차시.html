</head>
<body>
<h3>출력 결과는 F12 → Console 탭에서 확인하세요.</h3>
<script>
// ===== 2차시 실습: 숫자 계산 =====
let hp = 100;
let damage = 30;

// TODO 1: hp 에서 damage 를 뺀 값을 출력하세요.
console.log(hp - damage);


// TODO 2: hp 에 50 을 더해 출력하세요.
// console.log(hp + 50);
console.log(hp, 50);


// TODO 3: 7 을 2 로 나눈 나머지를 출력하세요. (% 사용)
// console.log(7 % 2);
console.log(7 % 2);


// 10진수 -> 2진수 만들기
/*
예시1) 37
    37/2 = 몫 18  나머지 1
    18/2 = 몫 9   나머지 0
    9/2  = 몫 4   나머지 1
    4/2  = 몫 2   나머지 0
    2/2  = 몫 1   나머지 0
    1/2  = 몫 0   나머지 1
    나머지를 아래부터 차례대로 나열 -> 100101

예시2) 70
    70/2 = 몫 35  나머지 0
    35/2 = 몫 17  나머지 1
    15/2 = 몫 8   나머지 1
    7/2  = 몫 4   나머지 0
    3/2  = 몫 2   나머지 0
    2/2  = 몫 1   나머지 0
    1/2  = 몫 0   나머지 1
    나머지를 아래부터 차례대로 나열 -> 1000110
*/ 


// 2진수 -> 10진수 만들기
/*
예시1) 10101  
    1   ->  2의 0제곱 = 1
    0   ->  X
    1   ->  2의 2제곱 = 4
    0   ->  X
    1   ->  2의 4제곱 = 16
    X를 제외한 값 더하기    -> 1 + 4 + 16 = 21

예시2) 11010
    0   ->  X
    1   ->  2의 1제곱 = 2
    0   ->  X
    1   ->  2의 3제곱 = 8
    1   ->  2의 4제곱 = 16
    X를 제외한 값 더하기    -> 2 + 8 + 16 = 26

*/


</script>
</body>
