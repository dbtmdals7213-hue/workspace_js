<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 
        주제: 입장객 수와 한 줄에 앉을 수 있는 사람의 수를 입력받아
             좌석 배치도를 생성하는 프로그램
    -->
    <h1>자리 배치도</h1>

    <script>
        // i 와 j 는 반복문에서 사용할 변수입니다.
        // i 는 현재 줄(행)의 위치번호를 저장됩니다.
        // j 는 현재 줄에서의 열 위치번호가 저장됩니다.
        let i, j;

        // 전체 입장객 수를 prompt 함수를 이용해 입력받아 memNum 변수에 저장
        let memNum = prompt("입장객은 몇 명인가요?");
        // 결론: memNum 변수에 저장되는 값은 입력받은 전체 입장객 수! 저장된다.

        // 한 줄에 앉을 수 있는 사람 수를 입력받아 colNum 변수에 저장
        let colNum = prompt("한 줄에 몇 명씩 앉습니까?");
        // 결론: colNum 변수에 저장되는 값은 한 줄에 앉을 수 있는 사람의 수 저장된다.

        // 전체 줄(행)수를 계산하여 저장할 rowNum 변수 선언
        let rowNum;
        /*
            예를 들어, 전체 입장객 수(memNum)가 10명이고,
            한 줄에 앉을 수 있는 사람 수(colNum)가 4명이라고 가정해 봅시다.
            이 경우, 전체 줄 수(rowNum)은 다음과 같이 계산합니다.

            첫 번째 줄: 4명
            두 번째 줄: 4명
            세 번째 줄: 2명 (총 10명이기 때문에 마지막 줄 2명)

            따라서 rowNum 변수에 저장되는 전체 줄(행) 개수는? 3줄이 됩니다.
        */
        /* 전체 줄 수 계산 */
        // 전체 입장객 수를 한 줄에 앉을 수 있는 사람 수로 나누었을 때 나머지가 0이면
        if(memNum % colNum === 0){

            // 전체 줄 수는 memNum / colNum 이 됩니다.
            rowNum = parseInt(memNum / colNum);
        }else{  // 나머지가 0이 아니면

            // 전체 줄 수는 memNum / colNum의 몫에 1을 더한 값이 됩니다.
            // 이는 마지막 줄에 남은 좌석을 위해 한 줄을 더 추가하는 것입니다.
            rowNum = parseInt(memNum / colNum) + 1;
        }

        /* 테이블 표 생성 */
        document.write("<table>");  // 테이블 표의 시작 태그

        // 바깥쪽 for 반복문은 전체 줄 수 만큼 반복합니다.
        for(i = 0; i < rowNum; i++){
    
            // 각 줄은 <tr> 태그로 시작됩니다.
            document.write("<tr>");

            // for(){



            // }


            // 각 줄은 </tr> 태그로 종료됩니다.
            document.write("</tr>");
        }



        document.write("</table>"); // 테이블 표의 끝을 알리는 태그

    </script>

</body>
</html>
