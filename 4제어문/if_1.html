<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>

        /*
            예제: 사이트 방문자에게 입력받은 걸음 수를 조건문 if로 만들고
                 입력 받은 하루 걸음 수가 10,000 보 이상일 경우만 실행문 출력시키자.
        
            if 조건문
                if(조건식){
                
                    조건식이 참일때 실행할 실행문 코드;
                }

                해석: if 만약에~ 조건식의 결과가 참일 경우
                     중괄호 내부에 작성된 실행문 코드 실행시킨다.
        */
        // 순서1. 웹 사이트 방문자에게 하루 걷는 걸음 수를 입력 받아 walkAmount 변수 메모리에 저장
        let walkAmount = prompt("당신의 하루 걷는 양이 몇 보인지 입력해!", "0");
        //  10000
        //              만약 웹 사이트 방문자가 10000을 입력하고 [확인] 버튼을 누른 경우는 prompt 함수가 10000을 되돌려줘서
        //              let walkAmount 변수에 = 대입해서 저장하게 됩니다.

        // 순서2. 하루 걷는 걸음 수가 10000보 이상이냐? 묻는 조건식을 if 조건문으로 작성
        // if -> 만약에~
        // if(walkAmount >= 10000) -> 만약에~ walkAmount 변수에 저장된 값이 10000보다 크거나 같으냐? 라고 묻는 조건식
        //                         -> 만약에~ 입력 받은 걸음 수가 10000 이상이냐? 라고 묻는 조건식
        if(walkAmount >= 10000){    // <- 10000이상을 입력 받았을 때만 아래의 실행문 코드가 실행되어 출력할 영역 { }
                
                //조건식이 참일때 실행할 실행문 코드;
                document.write("매우 좋은 습관을 지니고 계시는군요!!");
            }
            // 결론:
            // 화면에 입력한 값이 10,000 보 이상일 경우에는 조건식의 결과가 true를 반환하여 실행문 코드를 실행해서 보여주지만,
            // 화면에 입력한 값이 10,000 보 미만일 경우에는 조건식의 결과가 false를 반환하여 실행문 코드가 실행하지 않아 보여주지 않는다.


    </script>

</body>
</html>
