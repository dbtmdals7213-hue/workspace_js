<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>

        // 주제: 삼항 조건 연산자 식을 이용해 변수에 저장된 값이 홀수인지, 짝수인지 판별하는 간단한 예 

        let num = 1;    let result;    // <- undefined

        /*
            삼항 조건 연산자 식 작성 방법

                        조건식 ? 조건식의 결과가 참이면 실행될 코드 : 조건식의 결과가 거짓이면 실행될 코드;
        */
        // num 변수 메모리에 저장된 값이 짝수이면? result 변수에 "짝수" 문자열 저장하고,
        //                           홀수이면? result 변수에 "홀수" 문자열 저장하자.
        result = num % 2 === 0 ? "짝수" : "홀수";
    //  [    ] =     조건식     ?  true : false;
        console.log(result);        // "홀수" <- num 변수에 저장된 1은 "홀수"

        num = 10;   // num 변수에 저장된 기존의 값 1은 삭제되고, 10이 최종 저장됨

        /*
            num 변수에 저장된 값이 짝수가 아니냐? 조건식을 작성하는데
            console.log를 이용해 "홀수이다" 바로 출력, 그 반대일 때는 "짝수이다" 라고 출력되게
            삼항 조건 연산자 식을 작성하세요.
        */
        num % 2 !== 0 ? console.log("홀수이다") : console.log("짝수이다");
    //  10  % 2 !== 0 
    //     0    !== 0
    //      false     ?          true          :         false        ;

    </script>

</body>
</html>
