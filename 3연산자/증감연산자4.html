<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>

        let num3 = 10;
        // num3 변수값 10을 먼저 write 출력 후 그 다음줄을 실행하기 전에 -- 해서 9로 만들어 줌.

        document.write(num3--, "<br>"); // 10
        document.write(num3, "<br>");   // 9

        // num3 변수값 9 앞에 -- 가 붙어 있으므로 먼저 --한 8로 만든 뒤 출력.
        document.write(--num3, "<br>"); // 8

    </script>

</body>
</html>
