<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        /*
            함수 선언 방법 2
                
                1. 함수 선언문
                    function 함수명(매개변수1, 매개변수2){

                        실행할 코드;

                        return 반환값;                    
                    }
        
                2. 함수 호출
                    함수명(인수1, 인수2);

                3. 이 실습의 핵심
                    - 함수 선언은 실행할 코드를 준비하는 단계이다.
                    - 함수 호출은 준비된 코드를 실행하는 단계이다.
                    - 매개변수는 함수가 값(인수)을 받기 위해 선언한 변수이다.
                    - 인수는 함수를 호출할 때 전달하는 실제 값이다.
                    - return 은 함수 코드 실행 결과 값을 함수를 호출한 줄의 자리로 되돌려주는 예약어이다.

        */
        // 문제1. 두 수를 더해서 반환하는 add 함수 선언
        function add(a, b){
            // a 와 b 는 각각 매개변수라고 부른다.

            // return 은 a + b 의 계산 결과를 함수를 호출한 줄의 자리로 되돌려주는 예약어.
            return a + b;
        }

        // add 함수 호출
        add(3, 5);

    </script>

</body>
</html>
