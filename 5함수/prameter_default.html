<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        /*
            함수의 매개변수에 데이터가 전달되는 과정은 함수를 정의할 때 함께 정의한 매개변수는
            함수 호출시 전달되는 데이터와 일대일 대응되어 데이터가 할당됩니다.
            따라서 첫 번째 인수는 첫 번째 매개변수에 할당되고,
            두 번째 인수는 두 번째 매개변수에 할당됩니다.
        */
        // x 함수 선언
        function x(a, b){

            console.log(a, b);
        }

        // x 함수 호출해서 사용
        x(1, 2);

        console.log("----------------------------------------------");

        /*
            함수의 매개변수는 함수 호출시 전달되는 데이터가 기본으로 할당되지만,
            함수를 호출할 때 데이터를 전달하지 않는다고 해서 오류가 발생하지 않습니다.
        */
        // y 함수 선언
        function y(num1, num2){

            console.log(num1, num2);    // undefined    undefined
        }

        // y 함수 호출할 때 전달하는 인수가 없으면?
        y();

        console.log("----------------------------------------------");

        // z 함수 선언
        function z(){
            console.log("매개변수가 없으므로 인수를 전달받아 사용할 수 없다. 하지만 오류가 발생하지 않음");
        }
        // z 함수를 호출할 때 전달하는 인수를 넣어 호출하자.
        z(10, 20);

        console.log("----------------------------------------------");

        // 화살표 함수 정의 시 매개변수 작성 방법
        // const 상수명 = (매개변수1, 매개변수2) => {매개변수1, 매개변수2 값을 사용해서 기능을 코드로 작성;}; 

        // => 화살표 함수 선언
        const s = (num1, num2) => {console.log(num1, num2);};

        // s => 화살표 함수 호출할 때 매개변수 num1 자리에는 인수 10을 전달, 매개변수 num2 자리에는 인수 20을 전달하면서 호출!
        s(10, 20);

        console.log("----------------------------------------------");

        // => 화살표 함수 선언
        const s2 = num1 => console.log(num1);

        // s2 => 화살표 함수 호출할 때 매개변수 num1 자리에 인수 100을 전달하면서 호출!
        s2(100);

    </script>

</body>
</html>
