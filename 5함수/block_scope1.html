<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>

        // --- 아래의 블록문 {    } 을 기준으로 전역 스코프 영역
        
        let a = 10;  // 전역 변수 a 선언 후 10 저장

        // 블록문 {    }
        {
            // ---------- 지역 스코프 영역 지역변수 b 선언 후 20 저장 ----------
            let b = 20;

            console.log(`블록문 내부(지역 스코프)에서 a 변수 값 얻어 출력: ${a}`);
            console.log(`블록문 내부(지역 스코프)에서 b 변수 값 얻어 출력: ${b}`);
        }

        console.log(`블록문 외부(전역 스코프)에서 a 변수 값 얻어 출력: ${a}`);
        console.log(`블록문 외부(전역 스코프)에서 b 변수 값 얻어 출력: ${b}`);
        // Uncaught ReferenceError: b is not defined -> 오류

        /*
            결론
                위 코드를 보면 블록 스코프 외부에 let 키워드로 변수 a 를 선언하고,
                블록 스코프 내부에 let 키워드로 변수 b 를 선언한 뒤 블록 스코프 내부와 외부에서 각각 참조합니다.

                코드를 실행하면 변수 a 는 전역 스코프 영역에 만들어 놓아서
                블록문 { } 내부나 외부에서 전부 참조할 수 있습니다.
                그러나 변수 b는 블록문 { } 내부에 선언한 지역 스코프 영역의 변수이므로
			    내부에서는 문제없이 참조하지만, 블록문 { } 외부에서는 참조할 수 없어 오류가 발생합니다.
        */

    </script>

</body>
</html>
