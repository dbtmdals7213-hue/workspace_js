<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>함수 실습</title>
<style>body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:0 20px;line-height:1.8;font-size:16px}button{padding:8px 16px;font-size:15px;cursor:pointer;margin:4px}input{padding:8px;font-size:15px;width:250px}#out{margin-top:16px;padding:12px;background:#eef1fb;border-radius:8px;min-height:24px}</style>
</head>
<body>
<h3>출력 결과는 F12 → Console 탭에서 확인하세요. 주석 설명을 보며 직접 코드를 작성하세요.</h3>
<script>
/*
    주제 : 화살표 함수

    - 화살표(=>) 로 함수를 짧게 쓰는 방법
    - 작성 공식 : const 함수이름 = (매개변수) => 돌려줄값;
    - 한 줄짜리는 return 과 중괄호 { } 를 생략할 수 있음
    - 매개변수가 1개면 괄호도 생략 가능
    - 하는 일은 일반 함수와 같음 (모양만 다름)
*/

// [1] a, b 를 더해 돌려주는 'add' 화살표 함수를 만드세요.
//     작성 공식: const 함수이름 = (a, b) => a + b;
    const add = (a, b) => a + b;
    // 위 문장에서 => {return a + b} 와 같이 { } 안의 실행문이 한 줄인경우 { } 중괄호와 return 이 생략 가능! 

// [2] add(3, 5) 를 출력하세요.
    console.log(add(3, 5));     // 출력: 8
    // 위 함수 정의에서 a(매개변수) 에 3(인수), b(매개변수) 에 5(인수) 이 입력되어 
    // a + b 의 값을 반환(return)해서 8을 받음. 

// -----------------------------------------------------------------------------------------------------

// [3] x 를 받아 2배로 돌려주는 'double' 화살표 함수를 만드세요.
//     매개변수가 1개면 괄호 생략 가능: x => x * 2
    const double = x => {return x * 2;};
    // 위 문장에서 (x) 로 매개변수가 1개인 경우 ( ) 의 괄호 생략 가능! 

// [4] double(10) 을 출력하세요.
    console.log(double(10));    // 출력: 20
    // 위 함수 정의에서 x(매개변수) 에 10(인수) 이 입력되어
    // x * 2 의 값을 반환(return)해서 20을 받음.

// -----------------------------------------------------------------------------------------------------

// [5] 공격력 a, 방어력 d 를 받아 데미지(a-d)를 돌려주는 'dmg' 화살표 함수를 만드세요.
    const dmg = (a, d) => a - d;

// [6] dmg(60, 25) 를 출력하세요.
    console.log(dmg(60, 25));   // 출력: 35
    // 위 함수 정의에서 a(매개변수) 에 60(인수), d(매개변수) 에 25(인수) 가 입력되어 
    // a - d 의 값을 반환(return)해서 35를 받음. 

// -----------------------------------------------------------------------------------------------------

// [7] hp 와 회복량 amount 를 받아 더해 돌려주는 'heal' 화살표 함수를 만드세요.
    const heal = (hp, amount) => hp + amount;

// [8] heal(40, 30) 을 출력하세요.
    console.log(heal(40, 30));
    // 위 함수 정의에서 hp(매개변수) 에 40(인수), amount(매개변수) 에 30(인수) 이 입력되어 
    // hp + amount 의 값을 반환(return)해서 70을 받음.

// -----------------------------------------------------------------------------------------------------

// [9] level 을 받아 필요 경험치(level * 100)를 돌려주는 'needExp' 화살표 함수를 만드세요.
    const needExp = level => level * 100;

// [10] needExp(5) 를 출력하세요.
    console.log(needExp(5));    // 출력: 500
    // 위 함수 정의에서 level(매개변수) 에 5(인수) 가 입력되어
    // level * 100 의 값을 반환(return)해서 500을 받음.

</script>
</body>
</html>
