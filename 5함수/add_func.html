<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        // 두 개의 매개변수로 전달받은 인수의 합을 구해서 반환(제공)하는 함수 선언
        function sum(num1, num2){

            let result = num1 + num2;

            // return -> 함수를 호출한 줄의 코드자리로 계산된 값을 반환
            // return 반환할_값;
            return result;

            // 반환? 값을 되돌려준다.
        }

        // 100과 200의 합을 구하기 위해 합을 구해서 반환하는 sum 함수 호출! 호출 시 100과 200을 전달합니다.
        // 그러면 계산된 합의 값 300을 반환받아 value 변수를 만들어 저장시킵니다.
        let value = sum(100, 200);
        console.log(value);  // 출력: 300

        // sum 이라는 이름의 함수 호출! 10과 20을 매개변수로 각각 순서대로 전달해서 10 + 20 의 결과 30을 제공받고 싶다.
        console.log(sum(10, 20));  // 출력: 30

    </script>

</body>
</html>
