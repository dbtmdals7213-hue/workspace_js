<!DOCTYPE html>
<html lang="ko">

    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>연습문제 1</title>
        <link rel="stylesheet" href="css/quiz-1.css" />
    </head>
    <body>
        <div id="container">
            <h1>참가자 명단</h1>
            <form>
                <ul id="userInput">
                    <li>
                        <label for="username">이 름</label>
                        <input type="text" id="username" />
                    </li>
                    <li>
                        <label for="major">전 공</label>
                        <input type="text" id="major" />
                    </li>
                </ul>
                <button>등록하기</button>
            </form>
            <table id="attendant">
                <thead>
                    <tr>
                        <th>이 름</th>
                        <th>전 공</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <script>
            // id 가 "username" 인 <input type="text" id="username" /> 요소 선택
            const username = document.querySelector("#username");

            // id 가 "major" 인 <input type="text" id="major" /> 요소 선택
            const major = document.querySelector("#major");

            // <form> 요소의 하위 요소인 <button>등록하기</button> 요소 선택
            const bttn = document.querySelector("form > button");

            // <button>등록하기</button> 클릭하면?
            bttn.addEventListener("click", (e) => {

                // <form> 의 submit 전송 이벤트 차단
                e.preventDefault();

                // id 가 attendant 인 <table> 요소의 하위 요소 중 <tbody></tbody> 요소 선택
                let tbody = document.querySelector("#attendant > tbody");

                // <tr></tr> 요소를 생성
                let newTr = document.createElement("tr");

                // <td></td> 요소를 생성
                let nameTd = document.createElement("td");

                // <td></td> 에 입력된 <input type="text" id="username" /> 텍스트노드 저장
                nameTd.innerText = username.value;

                // "username" 빈 공백으로 설정
                username.value = "";

                // <td></td> 요소 생성
                let majorTd = document.createElement("td");

                // <td></td> 에 입력된 <input type="text" id="major" /> 텍스트노드 저장
                majorTd.innerText = major.value;

                // <input type="text" id="major" /> 빈 공백으로 설정
                major.value = "";

                // <tr></tr> 에 자식요소 <td>...</td> 추가
                newTr.appendChild(nameTd);

                // 추가된 <tr><td>...</td></tr> 에 자식요소 <td>...</td> 추가
                newTr.appendChild(majorTd);

                // <tbody></tbody> 에 자식요소 추가된 <tr><td>...</td><td>...</td></tr> 추가
                tbody.appendChild(newTr);
            });
        </script>
    </body>
</html>
