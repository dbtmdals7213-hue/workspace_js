<!DOCTYPE html>
<html lang="ko">

    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>연습문제 1</title>
        <link rel="stylesheet" href="css/quiz-1.css" />
    </head>

    <body>
        <div id="container">
            <h1>참가자 명단</h1>
            <form>
                <ul id="userInput">
                    <li>
                        <label for="username">이 름</label>
                        <input type="text" id="username" />
                    </li>
                    <li>
                        <label for="major">전 공</label>
                        <input type="text" id="major" />
                    </li>
                </ul>
                <button>등록하기</button>
            </form>

            <table id="attendant">
                <thead>
                    <tr>
                        <th>이 름</th>
                        <th>전 공</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <script>
            // id 가 "username" 인 <input> 요소 선택해서 "username" 이름의 배열로 저장
            const username = document.querySelector("#username");

            // id 가 "major" 인 <input> 요소 선택해서 "major" 이름의 배열로 저장
            const major = document.querySelector("#major");

            // <form> 요소의 하위 요소인 <button> 요소를 선택해서 "bttn" 이름의 배열로 저장
            const bttn = document.querySelector("form > button");

            // <form> 요소의 하위 요소가 선택되어 저장된 "bttn" 변수에 "click" 이벤트를 사용하여 매개변수 'e' 를 가지는 이벤트 핸들러 함수 적용
            bttn.addEventListener("click", (e) => {

                // 
                e.preventDefault();

                // id 가 attendant 인 <table> 요소의 하위 요소 중 <tbody> 요소를 선택해서 "tbody" 이름의 배열로 저장
                let tbody = document.querySelector("#attendant > tbody");

                // <tr> 요소를 생성해서 "newTr" 이름의 배열로 저장
                let newTr = document.createElement("tr");

                // <td> 요소를 생성해서 "nameTd" 이름의 배열로 저장
                let nameTd = document.createElement("td");

                // "nameTd" 배열의 텍스트노드 자리에 "username" 배열의 값 저장
                nameTd.innerText = username.value;

                // "username" 배열 값을 빈 공백으로 설정
                username.value = "";

                // <td> 요소를 생성해서 "majorTd" 이름의 배열로 저장
                let majorTd = document.createElement("td");

                // "majorTd" 배열의 텍스트노드 자리에 "major" 배열의 값 저장
                majorTd.innerText = major.value;

                // "major" 배열의 값을 빈 공백으로 설정
                major.value = "";

                // "newTr" 배열에 자식요소 "nameTd" 추가
                newTr.appendChild(nameTd);

                // "newTr" 배열에 자식요소 "majorTd" 추가
                newTr.appendChild(majorTd);


                // "tbody" 배열에 자식요소 "newTr" 추가
                tbody.appendChild(newTr);

            });
        </script>
    </body>

</html>
