<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        // createNode1.html 을 간단히 줄인 코드 작성 문법

        // HTML 태그(요소)를 문자열로 직접 작성해서
        // <body> 요소 안에 한 번에 추가하는 방식 <--- 추천
    
        //1. <body> 요소 사이에 추가할 HTML 태그를 문자열로 작성
        const html = '<a href="https://gilbut.co.kr">길벗</a>';

        //2. <body> 요소 사이에 문자열 HTML 태그 추가
        document.body.innerHTML = html;

        // 한 줄로 하면?
        //  document.body.innerHTML = '<a href="https://gilbut.co.kr">길벗</a>';
        
    </script>

</body>
</html>
