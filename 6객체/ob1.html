<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 
        1. 객체(Object)란?
         - 객체는 여러 개의 값을 하나의 참조 값으로 관리하는 참조형 데이터이다.
         - 객체 안에는 속성(Property)과 메소드(Method)를 작성해 놓을 수 있습니다.

        1.1. 속성(Property) ? 객체 안에 저장된 값 -> 속성명: 값; 한 쌍
        1.2. 메소드(Method) ? 객체 안에 속성 값으로 저장된 함수 -> function 함수명(){} 한 쌍

    
        1.2.1. 자바스크립트 객체 종류 크게 2가지
               종류1) 사용자 정의 객체
               종류2) 자바스크립트 문법에서 이미 만들어 놓고 개발자에게 제공하는 객체


        1.3. 사용자 정의 객체 생성 작성 방법 크게 2가지로 나뉩니다.

            1.3.1. 방법1. new Object(); <-- 자바스크립트 예전 버전 작성 방식

                   let 객체참조변수명 = new Object();

            1.3.1.1 방법1 로 생성한 사용자 정의 객체 사용 방법

                        객체참조변수명.속성명 = 값;

                        객체참조변수명.메소드명 = function(){실행할 코드;}


            1.3.2. 방법2. 객체 리터럴 { }; 생성 방법 <-- 자바스크립트 최신 버전 작성 방식

                        let 객체참조변수명 = {
                        
                            속성명 = 값,

                            메소드 = function(){실행할 코드;}
                        
                        };

            1.3.2.1. 방법2 로 생성한 사용자 정의 객체 사용 방법 2가지
                        
                        객체 사용 방법1 - 점 표기법으로 속성이나 메소드 사용

                            객체참조변수명.속성명;  <-- 값을 얻을 수 있다.
                            객체참조변수명.속성명 = 새_값   <-- 값을 새 값으로 변경할 수 있다.
                            객체참조변수명.새_속성명 = 새_값;  <-- { }; 객체 메모리 내부에 새_속성명: 새_값; 한 쌍 추가할 수 있다.

                            객체참조변수명.메소드명(); 

                        객체 사용 방법2 - 대괄호 표기법으로 속성이나 메소드 사용

                            객체참조변수명["속성명"]    <-- 속성명에 관한 "값" 얻어올 수 있다.
                            객체참조변수명["새_속성명"] = 새_값;    <-- { }; 객체 내부에 새_속성명: 새_값 한 쌍 추가할 수 있다.
    
    -->
    <script>
        /*
            주제: new 키워드와 기본객체를 생성하는 Object(); 생성함수를 이용해
                 개발자가 필요에 의해 직접 만들어서 사용하는 사용자 정의 객체 만들어 보기

            [객체를 만들기 위한 스토리]
        
                    객체? 현실에 존재하는 자신만의 값 + 기능 을 가진 모든 사물이나 사람 등을 객체라고 합니다.

                    객체 모델링? 현실에 존재하는 객체의 값과 기능을 추출해서 설계하는 작업.
        
                    TV 객체 모델링하여 값 + 기능 추출합시다.

                        값(데이터): 너비(30cm), 높이(25cm), 무게값(20kg), 색상(흰색)
                        기능: 전원기능, 채널을 변경하는 기능, 볼륨을 높이거나 낮추는 기능

                    설명: 모든 값들은 각각의 속성을 만들어서 ***** 속성명: 값 ***** 한 쌍 형태로 저장시킵니다.

                         모든 기능들은 각각의 함수로 만들어서 기능을 ***** function 함수명(){} ***** 정의해 놓습니다.
                         객체 내부에 만든 함수는 메소드라 부릅니다.
        */

        // 1. LGTv 객체 메모리 생성
        let lgTv = new Object();
        /*
            [ ] = |         |
                  |         |       <- lgTv 객체 메모리
                  |         |
        */
        // -> 윗 줄에서 생성된 lgTv 객체 메모리에 접근하여 속성과 메소드를 새로 만들어 추가하자.
        // 새 속성을 만들고 속성명에 값을 저장하는 방법
        //      객체참조변수명.속성명 = 값;
            lgTv.width = "30cm";
            lgTv.height = "25cm";
            lgTv.weight = "20kg";
            lgTv.color = "white";
        
        /*
            [0x16] = |                 |
                     | width : "30cm", |
                     | height: "25cm", |    <- lgTv 객체 메모리
                     | weight: "20kg", |
                     | color : "white" |
        */
        // -> 윗 줄에 생성된 lgTv 객체 메모리에 접근하여 lgTv 의 전원을 끄는 기능(메소드===함수)을 만들어 추가하자.
        // 새로운 메소드를 만들고 객체에 추가하는 방법
        //      객체참조변수명.메소드명 = function(){기능을 코드로 작성;};
                    lgTv.off = function(){

                        // 기능을 코드로 작성;
                        document.write("전원끄기 <br>");
                    };
        /*
            [0x16] = |         속성들        |
                     |    width : "30cm",   |
                     |    height: "25cm",   |
                     |    weight: "20kg",   |   <- lgTv 객체 메모리
                     |    color : "white"   |
                     |         메소드        |
                     |  off = function(){}  |
                     ㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡ
        */
        // -----------------------------------------------------------------------------------------------------------
        // -> 위 생성해 놓은 lgTv 객체 메모리 내부에 만들어져 있는 속성명과 함께 저장된 값 가져오기
        // 작성 방법
        //       객체참조변수명.속성명
        document.write(lgTv.width);   // lgTv 객체 메모리 내부에 저장된 width 속성명과 한 쌍으로 같이 저장된 값 30cm 가져와 출력
                       // 30cm
        document.write("<br>");

        // lgTv 객체 메모리 내부에 저장된 height: "25cm" 한 쌍을 보고 값 "25cm" 가져와 출력
        document.write(lgTv.height, "<br>");
                          // "25cm"

        // lgTv 객체 메모리 내부에 저장된 weight: "20kg" 한 쌍을 보고 값 "20kg" 가져와 출력
        document.write(lgTv.weight, "<br>");
                          // "20kg"

        // lgTv 객체 메모리 내부에 저장된 color: "white" 한 쌍을 보고 값 "white" 가져와 출력
        document.write(lgTv.color, "<br>");
                          // "white"
        
        // -----------------------------------------------------------------------------------------------------------
        // 위 lgTv 객체 메모리 내부에 만들어져 있는 off 메소드 호출!
        // 작성 방법
        //      객체참조변수명.메소드명();
                        lgTv.off();
                      // "전원끄기"

    </script>

</body>
</html>
