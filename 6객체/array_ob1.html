<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        /*
            변수 메모리
            - 하나의 데이터를 저장할 전체 메모리 공간
                예) let 변수명;
                    | undefined |

                    변수명 = 데이터1;
                    |    데이터1    |

                    변수명 = 데이터2;
                    |    데이터2    |
            - 결론: 하나의 데이터만 저장할 하나의 메모리 공간

            배열 객체 메모리(Array)
            - 하나의 메모리에 칸을 나누어서 하나 이상의 데이터를 함께 저장시킬 전체 메모리 공간
                예) [ 1, 2, 3, 4 ];  <-- 하나의 배열 메모리(Array) 공간

                이때 각 칸에 저장된 1, 2, 3, 4 들의 데이터를 요소라고 부른다.
            - 배열 메모리는 각 칸의 데이터에 접근하거나 저장된 데이터를 불러오거나
              각 칸에 저장된 데이터를 변경하기 위해 각 칸 위치에 번호가 0 부터 ~ 1씩 증가하면서
              붙게 되는데 이 번호를 index 라고 부릅니다.
                [ 1, 2, 3, 4 ];  <-- 하나의 배열 메모리 전체 공간
                  0  1  2  3  <-- index
            - 배열 메모리의 각 칸에 저장된 데이터(요소)는 index 번호를 사용하여 각 요소에 접근하여
              배열 메모리에 어떤 데이터 유형(문자열, 숫자, 객체, 다른 배열)이든 추가 저장, 삭제할 수 있습니다.

            - 자바스크립트 배열 메모리는 동적 배열로, 크기가 (칸의 개수가) 자동으로 조절됨.

            - 자바스크립트 배열 메모리(Array) 다양한 내장 메소드(함수)와 속성(변수) 등을 제공함
            예) length 속성, push() 메소드, shift() 메소드, unshift() 메소드 등

        ------------------------------------------------------------------------------------------------------------

            배열 메모리 생성 방법 2가지

                방법1. 리터럴 표기법 [    ] 대괄호 이용
                                                               배열 Array 메모리 주소번지 0x16

                    let 배열_메모리의_주소번지가_저장된_참조변수명 = [ "저장값1", 저장값2, 저장값3 ];

                                                    | 0x16 | =      0        1        2       <-- index

                                            예)   let colors = [  "Red"  , "Green", "Blue" ];

                방법2. Array 생성함수(생성자)를 이용
                                                                       배열 Array 메모리 주소 번지 0x17

                    let 배열_메모리의_주소번지가_저장된_참조변수명 = new Array( "저장값1", 저장값2, 저장값3 );

                                                     | 0x17| =               0        1        2      <-- index

                                            예)   let colors = new Array(  "Red"  , "Green", "Blue" );

                        단점: 과도한 new 키워드를 사용해야 하므로, 코드가 다소 장황해질 수 있습니다.
                              혼돈 가능성 있음
                            예) 만약 하나의 숫자인자를 전달하면, 해당 숫자를 길이로 가지는
                                비어있는 칸의 배열이 생성됩니다.
                                예를 들어 new Array(3) 은 길이가 3인 비어있는 배열을 생성하게 됨.


            두 배열 메모리 생성 방법 요약

                1. 리터럴 표기법 [ ] 방법은 배열 메모리를 더 쉽고 빠르게 만들 수 있는 방법.
                   코드가 간결하고 가독성이 띄어납니다. <--- 현업에서 사용

                2. new Array(); 생성자 함수 호출 방법은 배열 메모리를 생성하는 방법이긴 하지만,
                   사용 시 주의가 필요하며 코드가 다소 복잡해질 수 있습니다.

                결론: 일반적으로 리터럴 표기법 [ ] 방법으로 배열 메모리를 생성해서 사용하는걸 권장함.

        ------------------------------------------------------------------------------------------------------------

            생성된 배열 메모리의 각 index 위치 번호의 칸에 저장된 요소(데이터)를 불러와 사용하는 방법

                방법. 배열_메모리의_주소가_저장된_변수명[index];

                                       배열 메모리 주소 0x16

                    예) let colors = ["Red", "Green", "Blue"];
                            |0x16| =    0       1       2       <-- index 

                            colors[0];  -> "Red" 를 불러옵니다.
                            
                            colors[1];  -> "Green" 을 불러와 사용합니다.

                            colors[2];  -> "Blue" 를 불러와 이 자리에서 사용할 수 있게 됩니다.
        */
        
        // 배열 메모리 생성  -  리터럴 표기법 [ ] 사용
        let arr = [10, 20, 30];
        //         0   1   2     index

        // 10을 불러와 이 자리에서 출력
        console.log(arr[0]);    // 10

        // 20을 불러와 이 자리에서 출력
        console.log(arr[1]);    // 20

        // 30을 불러와 이 자리에서 출력
        console.log(arr[2]);    // 30

    </script>

</body>
</html>
