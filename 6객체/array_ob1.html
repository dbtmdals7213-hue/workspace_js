<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        /*
            변수 메모리
            - 하나의 데이터를 저장할 전체 메모리 공간
                예) let 변수명;
                    | undefined |

                    변수명 = 데이터1;
                    |    데이터1    |

                    변수명 = 데이터2;
                    |    데이터2    |
            - 결론: 하나의 데이터만 저장할 하나의 메모리 공간

            배열 객체 메모리(Array)
            - 하나의 메모리에 칸을 나누어서 하나 이상의 데이터를 함께 저장시킬 전체 메모리 공간
                예) [ 1, 2, 3, 4 ];  <-- 하나의 배열 메모리(Array) 공간

                이때 각 칸에 저장된 1, 2, 3, 4 들의 데이터를 요소라고 부른다.
            - 배열 메모리는 각 칸의 데이터에 접근하거나 저장된 데이터를 불러오거나
              각 칸에 저장된 데이터를 변경하기 위해 각 칸 위치에 번호가 0 부터 ~ 1씩 증가하면서
              붙게 되는데 이 번호를 index 라고 부릅니다.
                [ 1, 2, 3, 4 ];  <-- 하나의 배열 메모리 전체 공간
                  0  1  2  3  <-- index
            - 배열 메모리의 각 칸에 저장된 데이터(요소)는 index 번호를 사용하여 각 요소에 접근하여
              배열 메모리에 어떤 데이터 유형(문자열, 숫자, 객체, 다른 배열)이든 추가 저장, 삭제할 수 있습니다.

            - 자바스크립트 배열 메모리는 동적 배열로, 크기가 (칸의 개수가) 자동으로 조절됨.

            - 자바스크립트 배열 메모리(Array) 다양한 내장 메소드(함수)와 속성(변수) 등을 제공함
            예) length 속성, push() 메소드, shift() 메소드, unshift() 메소드 등

        ------------------------------------------------------------------------------------------------------------

            배열 메모리 생성 방법 2가지

                방법1. 리터럴 표기법 [    ] 대괄호 이용
                                                               배열 Array 메모리 주소번지 0x16

                    let 배열_메모리의_주소번지가_저장된_참조변수명 = [ "저장값1", 저장값2, 저장값3 ];

                                                    | 0x16 | =      0        1        2       <-- index

                                            예)   let colors = [  "Red"  , "Green", "Blue" ];

                방법2. Array 생성함수(생성자)를 이용
                                                                       배열 Array 메모리 주소 번지 0x17

                    let 배열_메모리의_주소번지가_저장된_참조변수명 = new Array( "저장값1", 저장값2, 저장값3 );

                                                     | 0x17| =               0        1        2      <-- index

                                            예)   let colors = new Array(  "Red"  , "Green", "Blue" );

                        단점: 과도한 new 키워드를 사용해야 하므로, 코드가 다소 장황해질 수 있습니다.
                              혼돈 가능성 있음
                            예) 만약 하나의 숫자인자를 전달하면, 해당 숫자를 길이로 가지는
                                비어있는 칸의 배열이 생성됩니다.
                                예를 들어 new Array(3) 은 길이가 3인 비어있는 배열을 생성하게 됨.


            두 배열 메모리 생성 방법 요약

                1. 리터럴 표기법 [ ] 방법은 배열 메모리를 더 쉽고 빠르게 만들 수 있는 방법.
                   코드가 간결하고 가독성이 띄어납니다. <--- 현업에서 사용

                2. new Array(); 생성자 함수 호출 방법은 배열 메모리를 생성하는 방법이긴 하지만,
                   사용 시 주의가 필요하며 코드가 다소 복잡해질 수 있습니다.

                결론: 일반적으로 리터럴 표기법 [ ] 방법으로 배열 메모리를 생성해서 사용하는걸 권장함.

        ------------------------------------------------------------------------------------------------------------

            생성된 배열 메모리의 각 index 위치 번호의 칸에 저장된 요소(데이터)를 불러와 사용하는 방법

                방법. 배열_메모리의_주소가_저장된_변수명[index];

                                       배열 메모리 주소 0x16

                    예) let colors = ["Red", "Green", "Blue"];
                            |0x16| =    0       1       2       <-- index 

                            colors[0];  -> "Red" 를 불러옵니다.
                            
                            colors[1];  -> "Green" 을 불러와 사용합니다.

                            colors[2];  -> "Blue" 를 불러와 이 자리에서 사용할 수 있게 됩니다.
        */
        
        // 배열 메모리 생성  -  리터럴 표기법 [ ] 사용
        let arr = [10, 20, 30];
        //         0   1   2     index

        // 10을 불러와 이 자리에서 출력
        console.log(arr[0]);    // 10

        // 20을 불러와 이 자리에서 출력
        console.log(arr[1]);    // 20

        // 30을 불러와 이 자리에서 출력
        console.log(arr[2]);    // 30

        // let arr = [10, 20, 30];
        //            0 , 1 , 2     index

        // arr 배열 메모리 전체의 칸 개수 얻는 방법 -> 배열명.length;
        console.log(arr.length);    // 3

        // for 반복문을 활용하여 arr 배열 메모리의 칸의 개수만큼 반복하여 10, 20, 30 을 각각 얻어 출력
        for(let i = 0; i < arr.length; i++){
            // i = 0, 1, 2 이므로 3번 반복

                // i -> 0 일때 index 0 위치 칸에서 10을 꺼내와 출력
                // i -> 1 일때 index 1 위치 칸에서 20을 꺼내와 출력
                // i -> 2 일때 index 2 위치 칸에서 30을 꺼내와 출력
                // i -> 3 일때 조건식 i < 3 에서 3 < 3 라고 물었기 때문에 거짓 false 이므로 for 반복문 종료
                console.log(arr[i]);
                            // 10
                            // 20
                            // 30
        }

        /*
            배열 메모리에 저장된 원본 데이터를 변겅시키는 메소드들을 파괴적 메소드들이라 부른다.

                파괴적 메소드들 종류

                    1. 배열 객체 메모리에서 제공하는 push() 메소드
                        기능: 배열 객체 메모리의 가장 뒷 칸에 새로운 데이터를 동적으로 추가시켜 한 칸을 늘리는 기능
                        방법: 배열명.push(새 데이터);

                    2. 배열 객체 메모리에서 제공하는 pop() 메소드
                        기능: 배열 객체 메모리의 가장 뒷 칸에 저장된 데이터만 추출(가져옴)하는 기능
                        방법: 배열명.pop();

                    3. 배열 객체 메모리에서 제공하는 unshift() 메소드
                        기능: 배열 객체 메모리의 가장 앞 칸에 새로운 데이터를 동적으로 추가시켜 한 칸을 늘리는 기능
                        방법: 배열명.unshift(새 데이터);

                    4. 배열 객체 메모리에서 제공하는 shift() 메소드
                        기능: 배열 객체 메모리의 가장 앞 칸에 저장된 데이터만 추출(가져옴)하는 기능
                        방법: 배열명.shift();
        */
        const arr2 = [10, 20, 30, 40];
                //    0   1   2   3     <- index: 각 칸의 위치번호
        
        // arr2 배열 객체 메모리의 가장 뒷 칸에 새로운 데이터를 동적으로 추가시켜 한 칸을 늘려 저장
        arr2.push(50);  // [10, 20, 30, 40, 50];
                        //  0   1   2   3   4     <- index: 각 칸의 위치번호
        
        console.log(arr2);  // const arr2 = [10, 20, 30, 40, 50];
                            //               0   1   2   3   4      <- index 각 칸의 위치번호

        // arr2 배열 객체 메모리의 가장 뒷 칸에 저장된 50 을 추출(잘라내기)
        let number = arr2.pop();    // 50
        console.log(number);    // 50
                                // const arr2 = [10, 20, 30, 40];
                                //               0   1   2   3      <- index 각 칸의 위치번호

        // arr2 배열 객체 메모리의 가장 앞 칸에 새로운 데이터를 동적으로 추가시켜 한 칸을 늘려 저장
        arr2.unshift(0);    // const arr2 = [0, 10, 20, 30, 40];
                            //               0   1   2   3   4      <- index 각 칸의 위치번호
        console.log(arr2);

        // arr2 배열 객체 메모리의 가장 앞 칸에 저장된 0 을 추출(잘라내기)
        let result = arr2.shift();  // 0
        console.log(result);    // const arr2 = [10, 20, 30, 40];
                                //               0   1   2   3      <- index 각 칸의 위치번호
                                
        // shift 메소드 호출 후 배열 모습 어떻게 바뀌었는지 arr2 배열 출력
        console.log(arr2);  //[10, 20, 30, 40]

    // ------------------------------------------------------------------------------------------------------------
        /*
            배열 객체 메모리가 제공하는 forEach() 메소드
                기능: 배열 객체 메모리에 저장된 전체 요소의 개수만큼 반복해서
                      배열 객체 메모리에 저장된 요소(데이터)를 하나씩 순회하면서
                      요소마다 콜백함수 function 을 자동으로 호출되게 하여 그 기능을 사용하는 메소드
                문법: 

                    const 배열명 = [데이터1, 데이터2, 데이터3];

                        배열명.forEach(function(매개변수1, 매개변수2, ...){
                        
                            반복 실행될 코드 작성;
                        
                        }, thisValue);


                        thisValue 자리에는 콜백함수 function 내부에서 this 예약어로 사용할 데이터 넣습니다.  <-- 선택
        
        */
        const arr3 = [10, 20, 30, 40];
        //            0   1   2   3     <- index
    // ------------------------------------------------------------------------------------------------------------


        // arr3 배열 객체 메모리에 저장된 모든 데이터의 개수만큼 콜백 function 이 자동으로 4번 반복되어 실행되면서 프로그램 돌아갑니다.
        arr3.forEach(function(value){
                //   function 콜백함수의 매개변수 value 로 자동으로 전달 받는 값은
                //   arr3 배열 객체 메모리의 0 index 위치 칸에 저장된 10부터 3 index 위치 칸에 저장된 40까지의 데이터를
                //   function 이 자동으로 반복 실행 될때마다  10  20  30  40  반복해서 얻어 사용
            console.log(value);     // 10
                                    // 20
                                    // 30
                                    // 40
            /*
                첫 function 이 호출되면? value 매개변수로 10을 전달 받아 사용
                두 번째 function 이 호출되면? value 매개변수로 20을 전달 받아 사용
                세 번째 function 이 호출되면? value 매개변수로 30을 전달 받아 사용
                네 번째 function 이 호출되면? value 매개변수로 40을 전달 받아 사용
            */
        });

    </script>

</body>
</html>
