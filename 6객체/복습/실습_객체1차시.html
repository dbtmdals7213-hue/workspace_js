<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>객체 실습</title>
<style>body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:0 20px;line-height:1.8;font-size:16px}button{padding:8px 16px;font-size:15px;cursor:pointer;margin:4px}input{padding:8px;font-size:15px;width:250px}#out{margin-top:16px;padding:12px;background:#eef1fb;border-radius:8px;min-height:24px}</style>
</head>
<body>
<h3>출력 결과는 F12 → Console 탭에서 확인하세요. 주석 설명을 보며 직접 코드를 작성하세요.</h3>
<script>
/*
    주제 : 객체 만들기와 점 표기법

    - 객체 : 값을 '이름표(key)'로 구분해 담는 자료. 중괄호 { } 로 만듦
    - 작성 공식 : let 객체이름 = { key: value, key2: value2 };
        · key   → 이름표
        · :     → key 와 value 를 잇는 기호
        · value → 저장할 값
    - 꺼내기 : 객체.key  (점 표기법)
    - 배열은 [번호], 객체는 .이름표 로 꺼냄
*/

// [1] name "마법사", hp 70, level 7 를 담은 'character' 객체를 만드세요.
//     작성 공식: let 객체 = { key: value, ... };
    let character = {
        name: "마법사",     // {속성명1: 값1,
        hp: 70,            //  속성명2: 값2,
        level: 7           //  속성명3: 값3};
    };

// [2] character 의 name 을 꺼내 출력하세요.
//     작성 공식: console.log(객체.key);
    console.log(character.name);    // "마법사"

// [3] character 의 hp 를 꺼내 출력하세요.
    console.log(character.hp);      // 70

// [4] character 의 level 을 꺼내 출력하세요.
    console.log(character.level);   // 7

// [5] "이름: " 과 character.name 을 이어 붙여 출력하세요.
//     작성 공식: console.log("문자열" + 객체.key);
    console.log("이름: " + character.name);     // 이름: "마법사"

// ------------------------------------------------------------------------------------------------

// [6] title "물약", price 60 을 담은 'item' 객체를 만드세요.
    let item = {    
        title: "물약",      // {속성명1: 값1,
        price: 60          //  속성명2: 값2};
    };

// [7] item 의 title 과 price 를 함께 출력하세요.
//     작성 공식: console.log(객체.key1, 객체.key2);
    console.log(item.title, item.price);    // "물약" 60

// [8] character 의 hp 와 level 을 더해 출력하세요.
//     작성 공식: console.log(객체.key1 + 객체.key2);
    console.log(character.hp + character.level);    // 70 + 7 -> 77 출력

</script>
</body>
</html>
