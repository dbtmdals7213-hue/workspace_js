<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        // 주제: 배열 메모리 생성 및 요소(데이터) 접근

    // 배열 메모리 생성 및 접근 실습
        // 1. [ ] 를 이용해 배열 메모리 생성 후 "Apple", "Banana", "Cherry" 문자열 각각 순서대로 저장
        //    배열명 -> fruites
        fruites = ["Apple", "Banana", "Cherry"];
        //            0         1         2         <- index

        // 2. fruites 배열 메모리의 첫 번째 칸에 저장된 "Apple" 요소를 얻어와 console.log 로 출력
        console.log(fruites[0]);    // "Apple"

        // 3. fruites 배열 메모리의 전체 칸에 저장된 요소 개수 얻어 console.log 로 출력
        console.log(fruites.length);    // 3


    // 배열 메모리에서 제공해주는 메소드 이용 실습
        // let fruites = ["Apple", "Banana", "Cherry"];
        //                   0         1         2         <- index

        // 1. fruites 배열 메모리의 가장 마지막 칸 위치 뒤에 새로운 한 칸을 늘려 "Date" 요소 추가
        fruites.push("Date");
        // fruites = ["Apple", "Banana", "Cherry", "Date"];
        //               0         1         2         3        <- index

        // 1.1. fruites 배열 메모리 전체 모습 console.log 로 출력
        console.log(JSON.stringify(fruites));   //  ["Apple", "Banana", "Cherry", "Date"]

        // 2. fruites 배열 메모리의 가장 마지막 칸 위치에 저장된 "Date" 요소를 추출(잘라내기) 후 value2 변수 선언 후 저장
        // fruites = ["Apple", "Banana", "Cherry"];
        //               0         1         2         <- index
        let value2 = fruites.pop(); // "Date"
        //  "Date"

        // 2.1. value2 변수에 저장된 "Date" 출력
        console.log(value2);    // "Date"

        // 2.2. fruites 전체 배열 모습 console.log 로 출력
        console.log(JSON.stringify(fruites));   // ["Apple", "Banana", "Cherry"]
        
        // let fruites = ["Apple", "Banana", "Cherry"];
        //                   0         1         2         <- index

        // 3. fruites 배열 메모리의 가장 첫 번째 칸에 저장된 "Apple" 요소를 제거하고, 제거한 값 "Apple" 추출(반환, 가져오기)
        let newDate = fruites.shift();

        // 3.1. newDate 변수 데이터 출력
        console.log(newDate);   // "Apple"

        // 3.2. fruites 전체 배열 모습 console.log 로 출력
        console.log(JSON.stringify(fruites));   // ["Banana", "Cherry"]

        // let fruites = ["Banana", "Cherry"];

        // 3.3. fruites 배열 메모리의 가장 첫 번째 칸 앞에 새로운 칸을 늘리면서 "Avodcado" 요소를 추가해서 저장
        fruites.unshift("Avodcado");

        // 3.4. fruites 전체 배열 모습 console.log 로 출력
        console.log(JSON.stringify(fruites));   // ["Avodcado", "Banana", "Cherry"]

        // let fruites = ["Avodcado", "Banana", "Cherry"];

    // 현재 배열 메모리가 제공하는 반복 메소드 forEach 활용

        // 1. fruites 배열 메모리의 각 칸에 저장된 각 요소(데이터)를 차례대로 반복해서 얻어 console.log 로 출력
        // 참고. forEach(function(){}) 메소드 사용!
        fruites.forEach(function(fruite){ console.log(fruite); });
                                              // "Avodcado"
                                              // "Banana"
                                              // "Cherry"

        // 1.1. fruites 배열 메모리의 각 칸에 저장된 각 요소(데이터)를 차례대로 반복해서 얻어 console.log 로 출력
        // 참고. forEach(화살표 함수 선언) 메소드 사용!
        fruites.forEach(fruite => console.log(fruite));
                                    // "Avodcado"
                                    // "Banana"
                                    // "Cherry"

        /*
        배열 객체 메모리가 제공하는 map() 메소드
            - 배열의 각 요소에 대해 주어진 콜백함수 function(){} 을 호출해서 실행하고,
              그 결과로 새로운 배열 메모리를 생성해서 새로운 배열 메모리 주소번지 자체를 반환하는 메소드
        
        map() 메소드 특징
            - 원본 배열 메모리에 저장된 데이터(요소)를 변경하지 않고, 계산에 의해 새로운 배열 메모리에 넣어 새 배열 주소 자체를 반환함.


            현재 아래와 같이 fruites 배열이 존재한다.

                let fruites = ["Avodcado", "Banana", "Cherry"];     <- 원본 데이터들이 저장된 원본 배열 메모리
                                    0         1          2          <- index
        */
        // 새 배열 메모리 주소 저장
        let upperFruites = fruites.map(function(fruite){
                                        // "Avodcado".toUpperCase();    -> 모두 대문자로 변경 후 "AVODCADO" 문자열 반환
                                        // "Banana".toUpperCase();      -> 모두 대문자로 변경 후 "BANANA" 문자열 반환
                                        // "Cherry".toUpperCase();      -> 모두 대문자로 변경 후 "CHERRY" 문자열 반환

                return fruite.toUpperCase();
            //  return "AVODCADO"
            //  return "BANANA"
            //  return "CHRRY"

        });
            // 새로운 배열 메모리가 생성되면서 반복해서 return 계산결과_값; 순서대로 실행되어 계산결과_값 을 넣어줍니다.
            // ["AVODCADO", "BANANA", "CHERRY"] 

        // fruites 원본 배열의 요소들을 가공한 새 배열 upperFruites 전체 모습 출력
        console.log(JSON.stringify(upperFruites));      // ["AVODCADO","BANANA","CHERRY"]

        // 화살표 함수 작성 방식으로 map 메소드 호출해서 사용해보자
        let upperFruites2 = fruites.map(fruite => fruite.toUpperCase());

        // fruites 원본 배열의 요소들을 가공한 새 배열 upperFruites2 전체 모습 출력
        console.log(JSON.stringify(upperFruites2));      // ["AVODCADO","BANANA","CHERRY"]

        // ---------------------------------------------------------------------------------------------------------------
        // 보충. map 메소드 사용

        let numbers = [1, 2, 3, 4, 5];  // 원본 데이터들이 저장된 원본 배열 메모리
        //             0  1  2  3  4    <- index

        // numbers 배열 메모리에 저장되어 있는 모든 숫자(요소)들을 차례대로 반복해서 얻어 자기 숫자를 곱한 결과 값 하나씩 새 배열에 넣어
        // 새 배열 메모리 자체를 반환 받고 싶다.
        //                                       1               1   *   1;     ->  1을 만들어 새로운 배열에 추가 -> [1]
        //                                       2               2   *   2;     ->  4를 만들어 새로운 배열에 추가 -> [1, 4]
        //                                       3               3   *   3;     ->  9를 만들어 새로운 배열에 추가 -> [1, 4, 9]
        //                                       4               4   *   4;     -> 16을 만들어 새로운 배열에 추가 -> [1, 4, 9, 16]
        //                                       5               5   *   5;     -> 25를 만들어 새로운 배열에 추가 -> [1, 4, 9, 16, 25]
        let newNumbers = numbers.map(function(number){ return number * number; });
        // [1, 4, 9, 16, 25]

        console.log(JSON.stringify(newNumbers));
        
    </script>

</body>
</html>
