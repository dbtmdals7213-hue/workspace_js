<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        /*
            주제1. 사용자 정의 객체 만들기

            객체 생성(만들기) 방법2. 리터럴 { } 이용
        
                let 참조변수명 = {속성명: 값, 메소드명: function(){코드;}};
        */
            let book1 = {title: "웹 표준의 정석", pages: 648};

        // ----------------------------------------------------------------------------------------

        /*
            주제2. 객체의 "속성명: 값" 한 쌍 중에 "값" 을 얻거나 변경하는 방법

                방법1. . 표기법 이용

                방법2. [ ] 표기법 이용
                
            let book1 = {title: "웹 표준의 정석", pages: 648};
        */
        // 방법1. . 표기법 이용
        //      객체참조변수명. 속성명 -> 객체 { } 내부에 만들어진 "속성명: 값" 중에서 "값" 얻는 문법
            console.log(book1.title);   // "웹 표준의 정석"
        // 방법1. . 표기법 이용
        //      객체참조변수명.속성명 = 변경할_값; -> 객체 { } 내부에 "속성명: 값" 중에서 "값" 변경 문법
            book1.title = "웹 표준의 정석2";

            console.log(JSON.stringify(book1));     // "{"title":"웹 표준의 정석2","pages":648}}"
            
        //  let book1 = "{"title":"웹 표준의 정석2","pages":648}}" <- 현재 book1 객체 상태

        // 방법2. [ ] 표기법 이용
        //      객체참조변수명("속성명") -> 객체 { } 내부에 "속성명: 값" 중에서 "값" 얻는 문법
            console.log(book1["title"]);  // "웹 표준의 정석2"
        // 방법2. [ ] 표기법 이용
        //      객체참조변수명["속성명"] = 변경할_값; -> 객체 { } 내부에 "속성명: 값" 중에서 "값" 변경 문법
                book1["title"] = "웹 표준의 정석"
            console.log(JSON.stringify(book1)); // {title: "웹 표준의 정석", pages: 648}

        // ----------------------------------------------------------------------------------------

        /*
            주제3. "속성명: 값" 이 존재하지 않는, 비어있는 객체 { } 를 생성한 후
                  나중에 "속성명: 값" 한 쌍씩 추가할 수 있다.
        */
        let book2 = {};             // <- 비어있는 객체
    //  let book2 = new Object();   // <- 비어있는 객체

        // book2 비어있는 객체에 "속성명: 값"한 쌍을 넣어 객체의 정보를 수정할 수 있다.
        book2.title = "Javascript";
        // {title: "Javascript"}
        
        book2.pages = 500;
        // {title: "Javascript", pages: 500}

        book2.author = "김개똥"
        // {title: "Javascript", pages: 500, author = "김개똥"}

        // 변경 된 객체 확인하기 위해 출력
        console.log(JSON.stringify(book2));
        // {title: "Javascript", pages: 500, author = "김개똥"}

        // ----------------------------------------------------------------------------------------

        /*
            주제4. 객체 { } 내부에 만들어져 있는 "속성명: 값" <- 한 쌍 삭제하기

                삭제 작성 문법
                    delete 객체참조변수명.속성명;
        */
        delete book2.pages;

        // 변경 된 객체 확인하기 위해 출력
        console.log(JSON.stringify(book2));
        // {title:"Javascript", author :"김개똥"}


    </script>

</body>
</html>
