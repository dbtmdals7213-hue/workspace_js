<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
    <body>
        <form name="frm1">
            <label for="uname">이름</label>
            <input type="text" id="uname" name="uname" value="김길동">
            <label for="age">나이</label>
            <input type="text" id="age" name="age" value="">
            <select id="gender" name="gender">
                <option value="male">남자</option>
                <option value="female" selected>여자</option>
            </select>
            <button type="submit">전송</button>
        </form>
        <script>
            /*
                1. <form>...</form> 선택해 옴
                    
                   방법: document.frm1

                2. <form name="frm1">...</form> 내부에 작성된 하위 입력할 수 있는 자식 태그들을
                   모두 HTMLFormControlsColletion 배열 메모리에 담아 배열 메모리 자체를 반환합니다.
                   
                   방법: document.frm1.elements
            */
            const HCC = document.frm1.elements;
            
            // 0 index 위치에 저장된 자식 아래의 <input> 태그를 선택해옵니다.
            // <input type="text" id="uname" name="uname" value="김길동">
            const label1 = HCC[0];
            console.log(label1);

            // 위 선택한 <form>...</form> 태그 안에 작성된 하위 태그들 중에서
            // [ ] 대괄호 안에 적은 name 속성값이 uname 인
            // <input type="text" id="uname" name="uname" value="김길동"> 자식 요소를 선택해옵니다.
            const input2 = HCC['uname'];
            console.log(input2);

            // document.frm1
            // -> <form name="frm1"></form> 태그를 선택해 오는데
            // -> name 속성값이 frm1인 <form> 한 쌍을 선택합니다.
            const input3 = document.frm1.uname;
            console.log(input3);

            const input4 = document.frm1.age;
            console.log(input4);

            /*
                document.forms 속성을 호출하면 작성되어 있는 <form>...</form> 태그를 배열에 담아 선택해옵니다.
                [<form>...</form>]
                        0       <--- index
                순서2. document.forms[0] 까지 작성하면 배열에서 <form>...</form> 을 얻어옵니다.

                순서3. document.forms[0].gender; 작성처럼 document.forms[0].name속성값; 을 작성하면
                <form>...</form> 사이에 작성된 자식 <select id="gender" name="gender">...</select> 한 쌍을 최종 선택해옵니다.
            */
            const selectElement = document.forms[0].gender;
            /*
            <select id="gender" name="gender">

                <option value="male">남자</option>
                <option value="female" selected>여자</option>

            </select> 요소를 최종 선택해옵니다.
            */
            const selectedValues = selectElement.value;
            console.log(selectedValues);    // female

        </script>

    </body>
</html>
