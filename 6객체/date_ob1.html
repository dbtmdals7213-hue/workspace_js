<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 
        ======================================================================================
        자바스크립트 객체 종류 크게 2가지

            종류1 > 사용자 정의 객체
            종류2 > 자바스크립트 문법에서 이미 만들어 놓고 개발자에게 제공하는 객체들
    
        종류2> 자바스크립트 문법에서 이미 만들어 놓고 개발자에게 제공하는 객체들

            1. 내장객체들
                Date 내장객체: 날짜와 시간 정보를 처리할 때 사용하는 객체
                String 내장객체: 문자열을 조작하거나 문자열 관리하는 객체
                Array 내장 배열 객체: 배열메모리를 생성해서 값을 관리하는 객체
                Math 내장객체: 수학 연산관련 메소들을 제공하는 객체

            2. 브라우저 객체 모델들
                window 브라우저 객체: 웹 브라우저 창 하나의 전체 정보를 가지며 관리하는 객체
                screen 브라우저 객체: 모니터 정보를 제공받거나 모니터 정보 관리하는 객체
                location 브라우저 객체: 웹 브라우저 주소창에 입력한 URL 관리하는 객체
                history 브라우저 객체: 웹 브라우저로 요청한 페이지로 이동하는 기능의 메소드 제공 객체
                ...

            3. 문서 객체(DOM)들
                .html 에 작성된 모든 HTML 태그들을 브라우저가 해석해서 변환 후 제공하는 객체들
                예) <h1>안녕</h1> <--- <h1> 문서 객체
                    <div>박스</div> <--- <div> 문서 객체
        

        내장 객체들 종류 중에서
            -> Date 객체: 날짜와 시간 정보를 관리하고 처리할 때 사용되는 메소드들을 제공하는 내장 객체.
                
                [1] Date 객체 메모리 생성 방법
                        
                    let 참조변수명 = new Date();
                        
                        참조변수명.getFullYear();   // 현재 컴퓨터에 설정된 년도 반환 기능의 메소드 호출!
                        참조변수명.getMonth();      // 현재 컴퓨터에 설정된 월 반환 기능의 메소드 호출
                        ...
    -->
    <script>
        /*
            1. 현재 날짜와 시간 정보를 제공해주는 Date 라는 이름의 객체 메모리 생성
                작성 방법
                    let 참조변수명 = new Date();
        */
        let today = new Date();
        /*
            1. 현재 몇월 달인지에 대한 정보를 제공받으려면?
                Date 객체 메모리에 만들어져 있는 getMonth() 메소드를 호출하면
                반환받는 값으로 현재 월-1 한 값을 반환받아 개발자가 사용할 수 있다. 
        */
        let nowMonth = today.getMonth() + 1;
    //  let nowMonth =         5        + 1; -> 6
        /*
            2. 현재 몇일인지에 대한 정보를 제공받으려면?
                Date 객체 메모리에 만들어져 있는 getDate() 메소드를 호출하면
                반환받는 값으로 현재 몇일인지에 대한 정보를 숫자 값으로 하나 반환해 줍니다.
        */
        let nowDate = today.getDate();
    //  let nowDate =       19       ;
        /*
            3. 현재 무슨 요일인지에 대한 정보를 제공받으려면?
                Date 객체 메모리에 만들어져 있는 getDay() 메소드를 호출하면
                현재 무슨 요일인지 숫자 하나로 반환해 줍니다.

                0 -> 일요일 의미
                1 -> 월요일 의미
                2 -> 화요일 의미
                3 -> 수요일 의미
                4 -> 목요일 의미
                5 -> 금요일 의미
                6 -> 토요일 의미
        */
        let nowDay = today.getDay();
    //  let nowDay =       5       ;

        document.write("현재 " + nowMonth, "월 " + nowDate + "일 ");
        if(nowDay === 5){
            document.write("금요일");
        }
        // "현재 6월 19일 금요일"

    </script>

</body>
</html>
