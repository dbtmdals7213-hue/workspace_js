<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>

        document.write("<h1>컴퓨터가 랜덤으로 가위, 바위, 보 중 하나 맞추는 게임</h1>");

        // window 객체 메모리 내부에 만들어져 있는 prompt() 메소드를 호출해서
        // 클라이언트에게 "가위", "바위", "보" 중에 하나의 단어를 입력받아 t 변수에 저장
        let t = window.prompt("가위, 바위, 보 중에서 하나의 단어만 입력하세요","가위");
        // "가위"

        // 클라이언트가 "가위" 입력 시 -> 1저장
        // 클라이언트가 "바위" 입력 시 -> 2저장
        // 클라이언트가 "보"   입력 시 -> 3저장
        // 위처럼 저장할 tNum 변수 생성
        let tNum;

        switch (t) {  // 클라이언트가 입력한 값("가위" or "바위" or "보" 중에서 하나의 값)으로 판단할 값
            
            case "가위":  // t 변수에 저장된 클라이언트가 입력한 값이 "가위" 와 같으냐?
                tNum = 1;
                break;

            case "바위":
                tNum = 2;
                break;

            case "보":
                tNum = 3;
                break;
        
            default:  // "가위", "바위", "보" 이외의 다른 데이터를 입력했을 경우!
                window.alert("잘못 작성하셨습니다.");  // 알림창(경고메세지)

                // F5 를 자동으로 누른 기능과 같다.
                location.reload();  // 새로 고침 처럼 현재 보고있는 math_ob2.html URL을 
                                    // 주소창에 자동으로 입력해주고 엔터를 눌러 현재 페이지를 재요청하는
                                    // 기능의 메소드

                break;
        }

        /*
            컴퓨터가 내는 랜덤 수(난수) 구하기
             - 1부터 3까지 중에서 랜덤 수(난수) 정수 하나로 발생시킵니다.

                1 -> 가위,  2 -> 바위,  3 -> 보
        */
        let com = Math.ceil(Math.random() * 3); 
        //      =       0.369
        //      = Math.ceil(      0.369      ) -> 1
        /*
            Math.random()
            -> 이 random() 메소드는 0.0(포함) ~ 1.0(제외) 사이의 임의의 부동 소수점 수 하나를 반환해 줍니다.
               예를 들어, 0.123 또는 0.567 또는 0.999 등의 값을 반환 받을 수 있습니다.
            
            Math.random() * 3 
            -> Math.random() 메소드의 반환값에 3을 곱합니다.
               이렇게 하면 0과 3사이의 임의의 수가 생성됩니다.
               예를 들어, 만약 Math.random() -> 0.123을 반환했다면 0.123 * 3은 0.369가 됩니다.

            Math.ceil(0.369)
            -> ceil 메소드는 소수점 첫 자리 3에서 올림 처리하여 정수 1로 만들어 반환합니다.
               위에서 계산된 0 과 3 사이의 0.369 수를 매개변수로 전달합니다.
               예를 들어, 0.369는 소수점 첫 자리 3에서 올림 처리하여 1이 되고,
               예를 들어, 2.5는 소수점 첫 자리 5에서 올림 처리하여 3이 됩니다.
               이 과정을 통해 결과적으로 1(가위) 또는 2(바위) 또는 3(보) 중에 하나의 랜덤 값을 추출할 수 있다. 
        */
        document.write("<img src = ./images/math_img_"+ com + ".jpg alt = 가위, 바위, 보>");
                    //     "<img src = ./images/math_ig_1.jpg alt = 가위, 바위, 보>"
                    //     "<img src = ./images/math_ig_2.jpg alt = 가위, 바위, 보>"
                    //     "<img src = ./images/math_ig_3.jpg alt = 가위, 바위, 보>"

        /*
            클라이언트가 입력한 "가위", "바위", "보" 중 하나와
                                1     2      3
            컴퓨터가 낸 난수(1또는 2또는 3)와 비교

            요약: tNum 변수에 저장된 값과 com 변수의 값이 같은지 비교
        */
        if(tNum === com){
            window.alert('컴퓨터가 낸 랜덤한 값과 당신이 입력한 값은 같습니다.');
            window.alert('축하합니다. 상품은 없습니다.');
        }else if(tNum !== com){
            alert('틀렸네요! 다음 기회에 도전하세요 치토스~~ 꽝!');
        }

    </script>

</body>
</html>
