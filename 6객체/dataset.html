<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
    <body>
        <button data-cnt="10">가방 구매</button>
        <button data-cnt="0">신발 구매</button>

        <script>
            const buttonEls = document.querySelectorAll("button");
            /*
                [<button data-cnt="10">가방 구매</button>, <button data-cnt="0">신발 구매</button>]
                                    0                                       1                       <--- index            
            */
            buttonEls.forEach(function(el){
                // dataset 속성을 호출하여 각 button 요소의 data- 로 시작하는 속성의 값을 가져왔습니다.
                // button 요소의 data- 싲가하는 속성에 대한 정보를 가져오는데
                // DOMStringMap 객체에 담아 DOMStringMap 객체 자체를 반환해서 가져옵니다.

                console.log(el.dataset);
                // DOMStringMap 객체 모습 ---> {cnt: '10'}
                // DOMStringMap 객체 모습 ---> {cnt: '0'}

                // data-cnt 속성의 값만 가져오고 싶다면?
                // 선택한button요소.dataset.cnt속성명 을 작성하면? '10' 값만 가져올 수 있음
                console.log(el.dataset.cnt);    // '10'
                                                // '0'

                // data-cnt 속성에 대한 값 변경
                el.dataset.cnt = 50;

                console.log(el.dataset.cnt);    // '50'
            });

            // 표시용 경계선
            console.log("-----------------------------------------");

            // forEach 화살표 함수로 변경
            buttonEls.forEach( el => {
                console.log(el.dataset);

                console.log(el.dataset.cnt);

                el.dataset.cnt = 100;

                console.log(el.dataset.cnt);
            });

        </script>

    </body>
</html>
