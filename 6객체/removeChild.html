<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- script 선언문 태그: 자바스크립트 코드 작성할 영역 -->
    <script>
        // 웹 브라우저 창(window 객체)이 removeChild.html 문서 내부에 작성된
        // 모든 HTML 요소노드들을 읽어들인 상태가 되었을 때
        // load 이벤트의 처리를 할 function 함수가 자동으로 실행되게 선언
        // 요약: load 이벤트가 발생했을 때 function 함수가 실행되어 기능 처리
        window.onload = function(){

            //1. <p>text 1</p> 요소노드 선택 
            const pEl = document.querySelector("p");
            /*
                자식_요소노드_명.parentNode
                    -> 선택한 자식 요소노드 <p>text 1</p> 를 감싸고 있는
                       부모 요소노드 <body>< /body> 를 최종 선택
            */

            //2. pEl 상수 메모리에 저장된 자식 요소노드 <p>text 1</p> 를 삭제
            // 방법. 부모_요소노드_명.removeChild(삭제할_자식_요소노드_명);
            pEl.parentNode.removeChild(pEl);
            
            // 위 1. 2. 두 줄의 코드를 아래와 같이 한 줄로 작성할 수 있다.
            // document.querySelector("p").pEl.parentNode.removeChild(document.querySelector("p"));
        };
    </script>

</head>
<body>
    <p>text 1</p>
    <a href="https://www.gilbut.co.kr">길벗</a>
    <a href="https://www.google.com">구글</a>
</body>
</html>
