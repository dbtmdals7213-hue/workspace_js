<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>

        <script>
            /*
                주제: <button></button> 에 두 가지 이벤트 등록 방식으로 click 이벤트와 mouseover 이벤트를 등록시켜
                     사용자가 이벤트를 했을 때 배경색이 바뀌도록 하는 예제.
            
                이벤트 등록 방식1. 요소에 직접 이벤트를 등록하는 방식

                    문법) <태그명 on이벤트_종류명="이벤트_처리함수_호출"></태그명>
                    
                이벤트 등록 방식2. DOM 을 이용한 이벤트 등록하는 방식
                
                    문법) 요소노드_선택.on이벤트_종류명 = "이벤트_처리함수_작성";
            */
            // 1. <body>< /body> 배경색상 설정할 문자열들을 배열을 생성해서 보관
            let color = ["white", "yellow", "aqua", "purple"];
            //              0        1        2        3        <--- index
            
            // 2. 위 color 배열의 index 위치 번호가 저장될 변수
            let i = 0;

            // 3. 위 color 배열에 배경색상 문자열을 이용해 아래에 작성된 <button> 을 클릭할 때 마다 호출되어
            //    <body>< /body> 의 배경색상을 변경하는 기능의 함수
            function colorBg(){

                if(i >= 3){
                    i = 0;
                }else{
                i++;    // 0 -> 1 -> 2 -> 3
                }

                // <body>< /body> 요소 한 쌍을 선택해서 변수에 저장
                let bodyTag = document.getElementsByTagName("body")[0];

                // 선택해온 <body>< /body> 요소 영역에 배경색을 color 배열의 각 칸에 저장된 i 변수 번째 index 위치 값으로 설정
                bodyTag.style.backgroundColor = color[i];

            }// ---> colorBg() 함수

            /*
                이벤트 등록 방식2. DOM 을 이용한 이벤트 등록 방식

                    문법) 요소노드_선택.on이벤트_종류명 = "이벤트_처리함수_작성";

                순서1. window 객체(웹 브라우저 창)에 load  이벤트 등록
            */
            window.onload = function(){

                // 순서2. <button id="btn2">버튼2</button> 요소 한 쌍을 선택해서 변수에 저장
                let btn2 = document.querySelector("#btn2");

                // 순서3. <button id="btn2">버튼2</button> 요소에 click 이벤트 등록 후 처리구문 작성
                //        처리구문 -> <body>< /body> 요소의 배경색을 color 배열의 각 칸에 저장된 색상 문자열로 변경하기 위해 colorBg() 함수 호출
                btn2.onclick = function(){ colorBg(); }

                // ==================================================================================================================

                // 순서2. <button>버튼4</button> 요소를 선택해서 변수에 저장
                let btn4 = document.querySelectorAll("button")[3];

                // 순서3. 선택한 <button>버튼4</button> 요소에 마우스 포인터가 올라가 있다가 내리는 동작(mouseout 이벤트) 등록
                btn4.onmouseout = function(){ colorBg(); }
            }

        </script>

    </head>
    <body>
        <p>
            <!-- 
                이벤트 등록 방식1. 요소에 직접 on이벤트_종류명 을 작성해서 이벤트 등록

                    -> 버튼1 을 한 번 클릭하면 colorBg(); 함수를 호출되게 하여 이벤트 처리하자
            -->

            <button onclick="colorBg();">버튼1</button>
        </p>

        <p>
            <!-- 
                이벤트 등록 방식2. 자바스크립트 코드로 등록할 요소 선택 후 on이벤트_종류명 을 작성해 이벤트 등록
                
                    -> 버튼2 를 한 번 클릭하면 colorBg(); 함수를 호출되게 하여 이벤트 처리하자
            -->
            <button id="btn2">버튼2</button>
        </p>

        <p>
            <!-- 
                이벤트 등록 방식1. 요소에 직접 on이벤트_종류명 을 작성해서 이벤트 등록

                    -> 버튼3 에 마우스 포인터를 올리는 동작(mouseover 이벤트)을 했을 때 colorBg() 함수를 호출!
            -->
            <button onmouseover="colorBg();">버튼3</button>
        </p>

        <p>
            <!-- 
                이벤트 등록 방식2. 자바스크립트 코드로 등록할 요소 선택 후 on이벤트_종류명 을 작성해 이벤트 등록

                    -> 버튼4 에 마우스 포인터가 올라가 있는 상태에서 마우스 포인터가 벗어나는 동작(mouseout 이벤트)을 했을 때
                       colorBg() 함수 호출!
            -->
            <button>버튼4</button>
        </p>
    </body>
</html>
