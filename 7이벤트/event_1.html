<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <p>
            <!-- 
                이벤트 등록 방식1. 요소에 직접 on이벤트_종류명 을 작성해서 이벤트 등록

                    -> 버튼1 을 한 번 클릭하면 colorBg(); 함수를 호출되게 하여 이벤트 처리하자
            -->

            <button onclick="colorBg();">버튼1</button>
        </p>

        <p>
            <!-- 
                이벤트 등록 방식2. 자바스크립트 코드로 등록할 요소 선택 후 on이벤트_종류명 을 작성해 이벤트 등록
                
                    -> 버튼2 를 한 번 클릭하면 colorBg(); 함수를 호출되게 하여 이벤트 처리하자
            -->
            <button id="btn2">버튼2</button>
        </p>
    </body>
</html>
