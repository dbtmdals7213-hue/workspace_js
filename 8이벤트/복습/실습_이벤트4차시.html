<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>이벤트 실습</title>
<style>body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:0 20px;line-height:1.8;font-size:16px}button{padding:8px 16px;font-size:15px;cursor:pointer;margin:4px}input{padding:8px;font-size:15px;width:250px}#out{margin-top:16px;padding:12px;background:#eef1fb;border-radius:8px;min-height:24px}</style>
</head>
<body>
<h3>주석 설명을 보며 직접 코드를 작성하세요. (아래 화면 요소를 자바스크립트로 다룹니다)</h3>
<input id="nick" type="text" placeholder="닉네임 입력">
<p id="hello">환영합니다!</p>
<hr>
<p id="score" style="font-size:2rem;font-weight:700">점수: 0</p>
<p id="level">레벨: 1</p>
<button type="button" id="clickBtn">클릭!</button>
<button type="button" id="resetBtn">리셋</button>

<script>
/*
    주제 : [종합 미니 프로젝트] 미니 클리커 게임

    이벤트 단원에서 배운 모든 것을 사용합니다.
    - 클릭 이벤트 / 값 누적 카운터 / 입력 이벤트(.value) / 여러 이벤트 연결

    [완성 목표]
    클릭하면 점수가 오르고, 점수가 일정 이상이면 레벨업하고,
    닉네임 입력칸은 실시간으로 인사말에 반영되며, 리셋 버튼으로 초기화합니다.
*/

// ===== 1단계: 요소 선택 =====

// [1] id가 score, level, clickBtn, resetBtn, nick, hello 인 요소들을
//     각각 변수에 저장하세요.
//     작성 공식: let 변수 = document.querySelector("#아이디");

// ===== 2단계: 점수 변수 (함수 밖 선언) =====

// [2] 'score' 변수를 만들고 0을 저장하세요. (함수 밖에!)
//     작성 공식: let 변수 = 0;

// ===== 3단계: 클릭 이벤트 (점수 증가 + 레벨업 판정) =====

// [3] clickBtn 에 클릭 이벤트를 연결하세요.
//     클릭하면 ① score 를 1 늘리고
//             ② scoreEl 의 글자를 "점수: " + score 로 바꾸고
//             ③ score 가 10 이상이면 levelEl 의 글자를 "레벨: 2" 로 바꾸도록 만드세요.
//     작성 공식:
//       대상.addEventListener("click", function() {
//         score++;
//         scoreEl.textContent = "점수: " + score;
//         if (score >= 10) {
//           levelEl.textContent = "레벨: 2";
//         }
//       });

// ===== 4단계: 리셋 이벤트 (점수 초기화) =====

// [4] resetBtn 에 클릭 이벤트를 연결하세요.
//     클릭하면 ① score 를 0으로 되돌리고
//             ② scoreEl 을 "점수: 0", levelEl 을 "레벨: 1" 로 바꾸도록 만드세요.

// ===== 5단계: 입력 이벤트 (닉네임 실시간 인사) =====

// [5] nick 입력칸에 input 이벤트를 연결하세요.
//     입력할 때마다 hello 의 글자를 nick.value + "님 환영합니다!" 로 바꾸도록 만드세요.
//     작성 공식:
//       대상.addEventListener("input", function() {
//         hello.textContent = nick.value + "님 환영합니다!";
//       });

// 완성! 클릭으로 점수 올리고, 10점에 레벨업, 닉네임 입력, 리셋이 모두 되면 성공입니다.
</script>
</body>
</html>
