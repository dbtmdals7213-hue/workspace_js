<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>이벤트 실습</title>
<style>body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:0 20px;line-height:1.8;font-size:16px}button{padding:8px 16px;font-size:15px;cursor:pointer;margin:4px}input{padding:8px;font-size:15px;width:250px}#out{margin-top:16px;padding:12px;background:#eef1fb;border-radius:8px;min-height:24px}</style>
</head>
<body>
<h3>주석 설명을 보며 직접 코드를 작성하세요. (아래 화면 요소를 자바스크립트로 다룹니다)</h3>
<button type="button" id="bell">초인종 누르기</button>
<div id="out">여기에 결과가 나옵니다</div>

<script>
/*
    주제 : 가장 기본적인 클릭 이벤트

    - 이벤트 : 사용자의 행동 (클릭 등)
    - 작성 공식 : 대상.addEventListener("click", function() { 실행할 코드 });
        · 대상       → 클릭할 요소 (querySelector 로 선택)
        · "click"    → 클릭 이벤트
        · function() → 클릭됐을 때 실행할 함수
    - 버튼을 누르면 연결해둔 함수가 실행됨
*/

// [1] id가 bell 인 버튼을 선택해 'bell' 변수에 저장하세요.
//     작성 공식: let 변수 = document.querySelector("#아이디");
let bell = document.querySelector("#bell");

// [2] id가 out 인 요소를 선택해 'out' 변수에 저장하세요.
let out = document.querySelector("#out");

// [3] bell 버튼에 클릭 이벤트를 연결하세요.
//     클릭하면 out 의 글자를 "딩동!" 으로 바꾸도록 만드세요.
//     작성 공식: 대상.addEventListener("click", function() { out.textContent = "글자"; });
bell.addEventListener("click", function(){out.textContent = "딩동!"});

// [4] id가 out 인 요소의 처음 글자를 콘솔에 출력하세요. (확인용)
//     작성 공식: console.log(요소.textContent);
console.log(out.textContent);

// 버튼을 눌러보세요! 화면의 글자가 "딩동!" 으로 바뀌면 성공입니다.
</script>
</body>
</html>
