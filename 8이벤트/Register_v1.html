<!DOCTYPE html>
<html lang="ko">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>회원가입</title>
        <style>
            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                font-family: Arial, sans-serif;
                background: #f3f6fb;
                color: #222;
            }

            .signup-container {
                max-width: 700px;
                margin: 40px auto;
                padding: 24px;
            }

            .signup-card {
                background: #fff;
                border-radius: 16px;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
                padding: 24px;
            }

            .signup-title {
                text-align: center;
                font-size: 24px;
                font-weight: 700;
                margin-bottom: 20px;
            }

            .form-row {
                display: flex;
                align-items: flex-start;
                gap: 16px;
                padding: 10px 0;
            }

            .form-label {
                width: 120px;
                font-weight: 600;
                padding-top: 8px;
                flex-shrink: 0;
            }

            .form-inputs {
                flex: 1;
                display: flex;
                flex-direction: column;
                gap: 6px;
            }

            input[type="text"],
            input[type="password"],
            select,
            textarea {
                width: 100%;
                padding: 10px;
                border: 1px solid #ccc;
                border-radius: 8px;
                font-size: 14px;
            }

            textarea {
                min-height: 100px;
                resize: vertical;
            }

            .radio-group,
            .checkbox-group {
                display: flex;
                flex-wrap: wrap;
                gap: 12px;
                align-items: center;
            }

            .error-message {
                color: red;
                font-size: 12px;
                min-height: 14px;
            }

            .submit-row {
                display: flex;
                justify-content: center;
                margin-top: 16px;
            }

            button[type="submit"] {
                padding: 10px 24px;
                border: none;
                border-radius: 8px;
                background: #2563eb;
                color: #fff;
                font-size: 15px;
                cursor: pointer;
            }

            button[type="submit"]:hover {
                background: #1d4ed8;
            }

            @media (max-width: 600px) {
                .signup-container {
                    padding: 16px;
                    margin: 20px auto;
                }

                .signup-card {
                    padding: 16px;
                }

                .form-row {
                    flex-direction: column;
                    gap: 6px;
                }

                .form-label {
                    width: 100%;
                    padding-top: 0;
                }
            }
        </style>
    </head>

    <body>
        <div class="signup-container">
            <form id="signupForm" class="signup-card" action="a.jsp" method="post">
                <div class="signup-title">회원가입</div>

                <div class="form-row">
                    <div class="form-label">*이름</div>
                    <div class="form-inputs">
                        <input type="text" id="uName" value="" />
                        <span id="uNameError" class="error-message"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-label">*ID</div>
                    <div class="form-inputs">
                        <input type="text" id="uID" />
                        <span id="uIDError" class="error-message"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-label">*비밀번호</div>
                    <div class="form-inputs">
                        <input type="password" id="uPWD" />
                        <span id="uPWDError" class="error-message"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-label">*비밀번호 확인</div>
                    <div class="form-inputs">
                        <input type="password" id="uPWD_Confirm" />
                        <span id="uPWDConfirmError" class="error-message"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-label">*직업</div>
                    <div class="form-inputs">
                        <select id="work">
                            <option value="">직업명</option>
                            <option value="기타">기타</option>
                            <option value="회사원">회사원</option>
                            <option value="학생">학생</option>
                        </select>
                        <span id="workError" class="error-message"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-label">*성별</div>
                    <div class="form-inputs">
                        <div class="radio-group">
                            <label><input type="radio" name="sex" value="male" /> 남자</label>
                            <label><input type="radio" name="sex" value="female" /> 여자</label>
                        </div>
                        <span id="sexError" class="error-message"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-label">*취미</div>
                    <div class="form-inputs">
                        <div class="checkbox-group">
                            <label><input type="checkbox" name="hobby" value="독서" /> 독서</label>
                            <label><input type="checkbox" name="hobby" value="등산" /> 등산</label>
                            <label><input type="checkbox" name="hobby" value="낚시" /> 낚시</label>
                        </div>
                        <span id="hobbyError" class="error-message"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-label">*가입동기</div>
                    <div class="form-inputs">
                        <textarea id="motivation"></textarea>
                        <span id="motivationError" class="error-message"></span>
                    </div>
                </div>

                <div class="submit-row">
                    <button type="submit">가입</button>
                </div>
            </form>
        </div>
        <script>
            /*
            이벤트 등록 방법3.
            선택한 요소에 특정 이벤트 종류를 등록하고
            특정 이벤트가 발생했을 때 이벤트 처리 함수를 작성하는 문법

            요소선택.addEventListener('등록할이벤트종류명중하나', 이벤트를 처리할 function(){});
            

            1. <form id="signupForm" class="signup-card" action="a.jsp" method="post">...< /form> 요소 선택해서
            submit <- 전송 요청 이벤트 등록하고, 전송 이벤트 처리 함수 작성
            
            */
            document.getElementById("signupForm").addEventListener("submit", function(event){
                                                                                /*
                                                                                    <form> 태그에
                                                                                    전송이벤트가 발생했을 때
                                                                                    function 함수의
                                                                                    매개변수 event 로
                                                                                    <form> 태그의 정보를 지닌
                                                                                    Event 객체가 매개변수로 전달 받는다.
                                                                                */
                /*
                    1-1. <button type="submit">가입</button> 클릭했을 때
                         <form action="a.jsp"> 태그에 작성된 a.jsp 서버 페이지로 가입 시 입력한 정보 전송 차단
                    
                    정보 전송 차단 이유: 입력 데이터의 유효성 검사가 모두 끝나면 정보 전송을 하기 위해
                    정보 전송 차단 방법: Event 객체에서 제공해주는 preventDefault(); 메소드 호출
                */
                event.preventDefault();

                document.write("하하하 차단 됐다! 그러니 내가 출력되는 것 이다.");

            });


        </script>

    </body>

</html>
