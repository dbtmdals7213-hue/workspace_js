<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>

        <link rel="stylesheet" href="css/event.css">
    </head>
    <body>
        BODY
            <div>
                DIV
                    <section>
                        SECTION
                            <p>
                                P
                            </p>
                    </section>
            </div>
    </body>
</html>
<script>
    //1. 현재 propagation.html 파일에 작성된 모든 HTML 요소들을 NodeList 유사배열에 담아 선택해옵니다.
    const elements = document.querySelectorAll("*");

    //2. NodeList 유사배열에 저장된 선택한 모든 HTML 요소들을 순회하면서 click 이벤트를 등록하고,
    //   각 HTML 요소에 click 이벤트가 발생하면 Event 객체의 target 속성과, currentTarget 속성을 호출한 값 출력
    for(let i = 0; i < elements.length; i++){

        elements[i].addEventListener("click", function(event){
            /*
                10개의 html 요소들 중에서 "click" 이벤트가 발생한 html 요소의 정보를 가지고 있는 Event 객체의
                target 속성을 호출해서 얻어 출력
            */
            // console.log(event.target.tagName);

            /*
                html 요소들 중에서 "click" 이벤트가 발생한 html 요소의 정보를 가지고 있는 Event 객체의
                currentTarget 속성을 호출해서 얻어 출력
            */
             console.log(event.currentTarget.tagName);

            // event.stopPropagation(); // 부모요소에 이벤트 전파 차단!
        }, false);
        // false 뜻: 버블링 이벤트 전파하겠다.(자식요소에 이벤트가 발생하면 그 상위 요소에도 이벤트 발생)
        // 참고. false 를 작성하지 않아도 false 가 자동으로 적혀있는 것임.
    }
</script>
