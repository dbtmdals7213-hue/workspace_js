<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>실습 - 이벤트 3차시</title>
<style>body{font-family:sans-serif;max-width:640px;margin:40px auto;padding:0 20px;line-height:1.7}

  <button type="button" id="atkBtn">공격</button>

/*

*/

// [1] id가 atkBtn, healBtn, out 인 요소들을 각각 변수에 저장하세요.

//       });

// [3] healBtn 에 클릭 이벤트를 연결하세요.
//     클릭하면 out 의 글자를 "회복! HP +30" 으로 바꾸세요.

// 공격/회복 버튼을 누르면 각각 다른 글자가 나오면 성공입니다!
  </script></body></html>
